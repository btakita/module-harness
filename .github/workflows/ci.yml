name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - run: cargo clippy -- -D warnings

      - run: cargo test

      - name: Install existence CLI
        run: cargo install existence

      - name: Lint ontology
        run: existence --ontology ontology lint
